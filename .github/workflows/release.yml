name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  quality:
    name: Quality and Compatibility
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v6
        with:
          go-version: "1.26.5"
          cache: true
      - run: go mod download
      - name: Check formatting
        run: |
          files="$(gofmt -l .)"
          if [ -n "$files" ]; then
            echo "$files"
            exit 1
          fi
      - run: go mod tidy
      - run: git diff --exit-code -- go.mod go.sum
      - run: go mod verify
      - run: go vet ./...
      - run: go test ./...
      - run: go test -race ./...
      - run: ./scripts/api-compat.sh
      - run: ./scripts/fuzz-smoke.sh
      - name: Run repeated race and performance gates
        env:
          FERRICSTORE_STRESS_COUNT: "5"
          FERRICSTORE_BENCHTIME: 25x
        run: ./scripts/stress.sh

  vulnerability:
    name: Vulnerability Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: "1.26.5"
          cache: true
      - run: go install golang.org/x/vuln/cmd/govulncheck@v1.6.0
      - run: govulncheck ./...

  integration:
    name: Released Server Integration
    runs-on: ubuntu-latest
    env:
      FERRICSTORE_IMAGE: ghcr.io/ferricstore/ferricstore:0.7.5
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: "1.26.5"
          cache: true
      - run: ./scripts/integration-docker.sh
      - run: ./scripts/integration-security-docker.sh
      - run: ./scripts/integration-cluster-docker.sh

  release:
    name: Publish GitHub Release
    needs: [quality, vulnerability, integration]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v6
        with:
          go-version: "1.26.5"
          cache: true
      - run: go list -m github.com/ferricstore/ferricstore-go@${GITHUB_REF_NAME}
      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "${GITHUB_REF_NAME}" --generate-notes --verify-tag

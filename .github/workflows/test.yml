name: Test

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: test-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  unit:
    name: Unit Go ${{ matrix.go-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        go-version: ["1.24.x", "1.25.x", "1.26.5"]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: ${{ matrix.go-version }}
          cache: true
      - run: go mod download
      - name: Check formatting
        run: |
          files="$(gofmt -l .)"
          if [ -n "$files" ]; then
            echo "$files"
            exit 1
          fi
      - run: go vet ./...
      - run: go test ./...
      - run: go test -race ./...

  lint:
    name: GolangCI-Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: "1.26.5"
          cache: true
      - uses: golangci/golangci-lint-action@v9
        with:
          version: v2.12.2
          args: --timeout=5m ./...

  hardening:
    name: Fuzz, Stress, and Performance Gates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: "1.26.5"
          cache: true
      - run: go mod download
      - name: Run protocol and URL fuzz smoke suite
        run: ./scripts/fuzz-smoke.sh
      - name: Run repeated race stress and allocation benchmarks
        env:
          FERRICSTORE_STRESS_COUNT: "5"
          FERRICSTORE_BENCHTIME: 25x
        run: ./scripts/stress.sh

  package:
    name: Package Dry Run
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: "1.26.5"
          cache: true
      - run: go mod tidy
      - name: Verify go.mod is tidy
        run: git diff --exit-code -- go.mod go.sum
      - run: go mod verify
      - run: go list ./...
      - name: Verify exported API compatibility
        run: ./scripts/api-compat.sh
      - run: go test ./cmd/dbos-style-benchmark

  integration:
    name: Integration FerricStore ${{ matrix.server-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        server-version: ["0.9.1"]
    env:
      FERRICSTORE_IMAGE: ghcr.io/ferricstore/ferricstore:${{ matrix.server-version }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: "1.26.5"
          cache: true
      - name: Run versioned integration tests
        run: ./scripts/integration-docker.sh
      - name: Run protected-mode, ACL, TLS, and mTLS tests
        run: ./scripts/integration-security-docker.sh
      - name: Run multi-node routing and failover tests
        run: ./scripts/integration-cluster-docker.sh

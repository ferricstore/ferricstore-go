services:
  ferricstore:
    image: ${FERRICSTORE_IMAGE:-ghcr.io/ferricstore/ferricstore:0.10.2@sha256:e6116d6f6c2c701e7c12076ed55233f4305e5fd6ff627cc3ed4ab7f828940cf3}
    ports:
      - "6388:6388"
    environment:
      FERRICSTORE_PROTECTED_MODE: "false"
    volumes:
      - ferricstore_data:/data

volumes:
  ferricstore_data:
